# ============================================================
# CI — Pull Request Quality Gate
# ============================================================
#
# Runs on every PR and push to main:
#   1. TypeScript type-check (both apps + shared package)
#   2. ESLint across the monorepo
#   3. Unit tests (turbo run test)
#   4. Playwright E2E on Chromium against a test environment
#
# SECURITY:
# - Secrets are never printed; SENTRY_AUTH_TOKEN scoped to CI env
# - Supabase test credentials are ephemeral (created via Supabase CLI)
# - Node version pinned via .nvmrc / engines field
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}

jobs:
  # ─── Type Check ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type-check all packages
        run: npm run typecheck

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run unit tests
        run: npm run test
        env:
          NODE_ENV: test

  # ─── E2E Tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright / Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run E2E when the required test secrets are available
    # (i.e. not for external contributor forks where secrets are absent)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Playwright browsers (Chromium only for CI speed)
        run: npx playwright install chromium --with-deps

      - name: Build web app
        run: npm run build --workspace=apps/web
        env:
          VITE_SUPABASE_URL:       ${{ secrets.CI_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:  ${{ secrets.CI_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL:       http://localhost:3001
          VITE_APP_ENV:            test

      - name: Start API server
        run: |
          cd apps/api
          npm run start &
          # Wait for the API to be ready
          npx wait-on http://localhost:3001/health --timeout 30000
        env:
          NODE_ENV:                  test
          SUPABASE_URL:              ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY:         ${{ secrets.CI_SUPABASE_ANON_KEY }}
          JWT_SECRET:                ${{ secrets.CI_JWT_SECRET }}
          PORT:                      3001

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=chromium --reporter=github
        env:
          PLAYWRIGHT_BASE_URL:        http://localhost:4173
          E2E_BUYER_EMAIL:            ${{ secrets.E2E_BUYER_EMAIL }}
          E2E_BUYER_PASSWORD:         ${{ secrets.E2E_BUYER_PASSWORD }}
          E2E_ADMIN_EMAIL:            ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD:         ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_SUPER_EMAIL:            ${{ secrets.E2E_SUPER_EMAIL }}
          E2E_SUPER_PASSWORD:         ${{ secrets.E2E_SUPER_PASSWORD }}
          CI:                         true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright trace on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
