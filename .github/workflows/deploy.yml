# ============================================================
# Deploy — Production Deployment Pipeline
# ============================================================
#
# Triggers on merge to main.
# Pipeline:
#   1. Build Docker images for the API
#   2. Push images to GitHub Container Registry (ghcr.io)
#   3. Run Supabase database migrations against production
#   4. Deploy to production (configurable target via workflow_dispatch)
#   5. Upload Sentry source maps and create a release
#
# SECURITY:
# - Production secrets only ever exist as GitHub Actions secrets
# - Database migrations run BEFORE the new API version is deployed
#   (backwards-compatible migrations required — "expand-contract" pattern)
# - Sentry auth token is scoped to source map upload only
# - Docker image is scanned for vulnerabilities before push
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  NODE_VERSION:  '20'
  TURBO_TOKEN:   ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:    ${{ secrets.TURBO_TEAM }}

jobs:
  # ─── Build & Typecheck ───────────────────────────────────────────────────────
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Typecheck all packages
        run: npm run typecheck

      - name: Build API (verify TypeScript compiles cleanly)
        # Vercel will build both API and web via vercel.json buildCommand.
        # We build here just to catch TS errors before touching production.
        run: npm run build --workspace=apps/api

  # ─── Database Migrations ─────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations (production)
        run: |
          supabase db push \
            --db-url "$SUPABASE_DB_URL" \
            --include-all
        env:
          SUPABASE_DB_URL:         ${{ secrets.PROD_SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN:   ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── Deploy — Vercel (API + Web) ─────────────────────────────────────────────
  # Vercel serves BOTH the web SPA and the Express API as a single project.
  # vercel.json rewrites /api/*, /webhooks/*, /health → apps/api/api/index.ts
  # All other routes → apps/web/dist/index.html (SPA fallback)
  deploy:
    name: Deploy (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [migrate]

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment & project config
        # Downloads .vercel/project.json so subsequent commands know the project
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project via Vercel
        # Vercel runs vercel.json buildCommand in a reproducible environment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Create Sentry release
        uses: getsentry/sentry-create-release@v1
        if: env.SENTRY_AUTH_TOKEN != ''
        with:
          environment: ${{ github.event.inputs.environment || 'production' }}
          version:     ${{ github.sha }}
          projects:    sbdmm-web,sbdmm-api
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
