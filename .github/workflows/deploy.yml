# ============================================================
# Deploy — Production Deployment Pipeline
# ============================================================
#
# Triggers on merge to main.
# Pipeline:
#   1. Build Docker images for the API
#   2. Push images to GitHub Container Registry (ghcr.io)
#   3. Run Supabase database migrations against production
#   4. Deploy to production (configurable target via workflow_dispatch)
#   5. Upload Sentry source maps and create a release
#
# SECURITY:
# - Production secrets only ever exist as GitHub Actions secrets
# - Database migrations run BEFORE the new API version is deployed
#   (backwards-compatible migrations required — "expand-contract" pattern)
# - Sentry auth token is scoped to source map upload only
# - Docker image is scanned for vulnerabilities before push
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  NODE_VERSION:  '20'
  TURBO_TOKEN:   ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:    ${{ secrets.TURBO_TEAM }}

jobs:
  # ─── Build & Typecheck ───────────────────────────────────────────────────────
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Typecheck all packages
        run: npm run typecheck

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build web app (production)
        run: npm run build --workspace=apps/web
        env:
          NODE_ENV:                        production
          VITE_SUPABASE_URL:               ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:          ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL:               ${{ secrets.PROD_API_BASE_URL }}
          VITE_APP_ENV:                    production
          VITE_SENTRY_DSN:                 ${{ secrets.PROD_SENTRY_WEB_DSN }}
          VITE_SENTRY_ENVIRONMENT:         production
          VITE_SENTRY_TRACES_SAMPLE_RATE:  '0.1'
          VITE_SENTRY_ORG:                 ${{ secrets.SENTRY_ORG }}
          VITE_SENTRY_PROJECT:             sbdmm-web
          SENTRY_AUTH_TOKEN:               ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE:                  ${{ github.sha }}
          VITE_APP_VERSION:                ${{ github.sha }}

  # ─── Database Migrations ─────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations (production)
        run: |
          supabase db push \
            --db-url "$SUPABASE_DB_URL" \
            --include-all
        env:
          SUPABASE_DB_URL:         ${{ secrets.PROD_SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN:   ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── Deploy API (Railway) ─────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [migrate]

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url:  ${{ vars.PROD_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        # Railway reads railway.toml from the repo root for build/start config.
        # RAILWAY_TOKEN is a project-scoped token from railway.app → project → settings → tokens
        run: railway up --service sbdmm-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Create Sentry API release
        uses: getsentry/sentry-create-release@v1
        if: env.SENTRY_AUTH_TOKEN != ''
        with:
          environment: ${{ github.event.inputs.environment || 'production' }}
          version:     ${{ github.sha }}
          projects:    sbdmm-api
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}

  # ─── Deploy Web (Vercel) ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [migrate]

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web to Vercel (production)
        # vercel.json at repo root configures build/output/headers/rewrites.
        # VERCEL_TOKEN    — from vercel.com → Account Settings → Tokens
        # VERCEL_ORG_ID   — from vercel.com → Team Settings → General → Team ID
        # VERCEL_PROJECT_ID — from vercel.com → Project → Settings → General → Project ID
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

