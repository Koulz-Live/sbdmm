# ============================================================
# railway.toml — Railway deployment config for the SBDMM API
# ============================================================
# Docs: https://docs.railway.app/reference/config-as-code
#
# Railway deploys the API directly from source using Node.js.
# No Docker required — Railway auto-detects npm and runs
# the build + start commands defined here.
# ============================================================

[build]
builder          = "NIXPACKS"
buildCommand     = "npm ci && npm run build --workspace=apps/api"

[deploy]
startCommand          = "node apps/api/dist/server.js"
healthcheckPath       = "/health"
healthcheckTimeout    = 30
restartPolicyType     = "ON_FAILURE"
restartPolicyMaxRetries = 3
